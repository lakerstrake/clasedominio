<!--
    login.html - Pagina de inicio de sesion
    Muestra un formulario de autenticacion con usuario y contrasena.
    Spring Security se encarga de validar las credenciales.
    Autor: Juan Manuel Lagos - Ficha 3114733 - ADSO SENA
-->
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/style.css}">
    <title>Iniciar Sesion</title>
</head>
<body>
    <!-- Wrapper centrado con fondo degradado -->
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Logo/icono de usuario -->
            <div class="login-logo">
                <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <h1 class="login-title">Bienvenido</h1>
            <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

            <!-- Alerta de error (credenciales incorrectas) -->
            <div th:if="${param.error}" class="login-alert login-alert-error">
                Usuario o contrasena incorrectos.
            </div>

            <!-- Alerta de exito (cierre de sesion) -->
            <div th:if="${param.logout}" class="login-alert login-alert-success">
                Sesion cerrada correctamente.
            </div>

            <!-- Formulario de login - Spring Security lo procesa en /login POST -->
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">Usuario</label>
                    <input id="username" class="form-input" type="text" name="username"
                           placeholder="Nombre de usuario" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Contrasena</label>
                    <input id="password" class="form-input" type="password" name="password"
                           placeholder="Tu contrasena" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Iniciar Sesion</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
